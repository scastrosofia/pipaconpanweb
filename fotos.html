    /* LIGHTBOX */
    .lightbox {
      display: none;

      top: 0; left: 0;

      z-index: 9999;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 85vw;
      max-height: 85vh;
      border: 4px ridge #E3007B;
      box-shadow: 0 0 60px #E3007B;
    }
    .lightbox .close {

      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #E3007B;
      cursor: pointer;
      text-shadow: 0 0 10px #E3007B;
      z-index: 10;

    .lightbox .close:hover { color: #FFF; }
    .lightbox .arrow {
      position: absolute;
      top: 50%;
      font-size: 4rem;
      color: #E3007B;
      cursor: pointer;
      user-select: none;
      background: none;
      border: none;
      padding: 0 24px;
      z-index: 10;
      transform: translateY(-50%);
    }
    .lightbox .arrow:hover { color: #FFF; }
    .lightbox .arrow-left { left: 0; }
    .lightbox .arrow-right { right: 0; }

  <script>
    var currentIndex = 0;
    var photoPaths = [
      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06142.jpg',
      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06169.jpg',
      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06182.jpg',

      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06201.jpg',
      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06216.jpg',
      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06224-2.jpg',
      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06225.jpg',
      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06227.jpg',
      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06248.jpg',
      'fotos/POPENVIVO - PIPA FIX (@zivi0000)-3-001/POPENVIVO - PIPA FIX (@zivi0000)/DSC06256.jpg'
    ];

    function openLightbox(index) {
      currentIndex = index;
      document.getElementById('lightbox-img').src = photoPaths[currentIndex];
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }
    function showPhoto(index) {
      currentIndex = (index + photoPaths.length) % photoPaths.length;
      document.getElementById('lightbox-img').src = photoPaths[currentIndex];
    }
    function nextPhoto(e) {
      if (e) e.stopPropagation();
      showPhoto(currentIndex + 1);
    }
    function prevPhoto(e) {
      if (e) e.stopPropagation();
      showPhoto(currentIndex - 1);
    }
    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') nextPhoto(e);
      if (e.key === 'ArrowLeft') prevPhoto(e);
    });
  </script>

  <!-- CURSOR SPARKLES -->
  <script>
  (function() {
    const COLORS = ['#E3007B','#E3007B','#ffffff','#E3007B','#E3007B'];
    let last = 0;
    document.addEventListener('mousemove', e => {
      const now = Date.now();
      if (now - last < 35) return;
      last = now;
      const s = document.createElement('div');
      const sz = Math.random() * 8 + 4;
      s.style.cssText = 'position:fixed;border-radius:50%;pointer-events:none;z-index:2147483646;width:'+sz+'px;height:'+sz+'px;left:'+(e.clientX+(Math.random()-.5)*24)+'px;top:'+(e.clientY+(Math.random()-.5)*24)+'px;background:'+COLORS[Math.random()*COLORS.length|0]+';opacity:1;transition:opacity 0.6s,transform 0.6s';
      document.body.appendChild(s);
      requestAnimationFrame(() => { s.style.opacity='0'; s.style.transform='translateY(-'+(Math.random()*30+15)+'px) scale(0.3)'; });
      setTimeout(() => s.remove(), 680);
    });
  })();
  </script>
